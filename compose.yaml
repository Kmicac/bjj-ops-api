name: bjj-ops-api

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - app-net

  app:
    build:
      context: .
      target: development
    restart: unless-stopped
    init: true
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      PORT: 3001
    ports:
      - "3001:3001"
    command: >
      sh -lc "pnpm prisma:generate && pnpm start:dev"
    volumes:
      - .:/app
      - app-node-modules:/app/node_modules
      - app-generated-prisma:/app/src/generated/prisma
    networks:
      - app-net

volumes:
  postgres-data:
  app-node-modules:
  app-generated-prisma:

networks:
  app-net:
    driver: bridge
